<article class="hr_hero">
  <div class="hr_hero-wrapper">
    <div class="hr_hero-title-wrapper">
      <h1 class="hr_hero-title">
        Follow one tiny grain as it finds its way home.
      </h1>
      <p class="hr_hero-subtitle">
        It's a little puzzle game that's all about taking your time and finding
        the perfect spot.
      </p>
      <a
        href="https://play.google.com/store/apps/details?id=com.konstant.maze&hl=en&gl=us"
        class="hr_hero-btn"
        >Find the Rest</a
      >
    </div>
    <figure class="hr_hero-img-wrapper">
      <picture>
        <source
          media="(min-width: 1440px)"
          srcset="/img/hero/hero.png 1x, /img/hero/hero@2x.png 2x"
          type="image/png"
        />

        <source
          srcset="/img/hero/hero-mob.png 1x, /img/hero/hero-mob@2x.png 2x"
          type="image/png"
        />
        <img
          class="hr_hero-img"
          src="/img/hero/hero.png"
          alt="Hero image"
          loading="lazy"
        />
      </picture>
    </figure>
  </div>
</article>
