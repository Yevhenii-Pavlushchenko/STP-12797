<article id="how-it-works" class="hiw_section">
  <div class="container hiw_wrapper">
    <h2 class="hiw_section-title">How It Works</h2>

    <div class="hiw_slider-viewport">
      <div class="hiw_slider-track" data-hiw-track>
        <figure class="hiw_card" data-hiw-slide>
          <div class="hiw_card-thumb">
            <picture>
              <source
                media="(min-width: 1440px)"
                srcset="
                  img/how-it-works/how1.png    1x,
                  img/how-it-works/how1@2x.png 2x
                "
              />
              <source
                srcset="
                  img/how-it-works/how1-mob.png    1x,
                  img/how-it-works/how1-mob@2x.png 2x
                "
              />
              <img
                class="hiw_card-img"
                src="img/how-it-works/how1-mob.png"
                alt="Tilt the World gameplay step"
                loading="lazy"
              />
            </picture>
          </div>
          <figcaption class="hiw_card-content">
            <h3 class="hiw_card-title">Tilt the World</h3>
            <p class="hiw_card-text">
              Rotate the terrain gently — the grain responds to gravity, surface
              texture, and the hidden geometry beneath.
            </p>
          </figcaption>
        </figure>

        <figure class="hiw_card" data-hiw-slide>
          <div class="hiw_card-thumb">
            <picture>
              <source
                media="(min-width: 1440px)"
                srcset="
                  img/how-it-works/how2.png    1x,
                  img/how-it-works/how2@2x.png 2x
                "
              />
              <source
                srcset="
                  img/how-it-works/how2-mob.png    1x,
                  img/how-it-works/how2-mob@2x.png 2x
                "
              />
              <img
                class="hiw_card-img"
                src="img/how-it-works/how2-mob.png"
                alt="Let It Breathe gameplay step"
                loading="lazy"
              />
            </picture>
          </div>
          <figcaption class="hiw_card-content">
            <h3 class="hiw_card-title">Let It Breathe</h3>
            <p class="hiw_card-text">
              When you hold still, new layers appear underneath - it's pretty
              cool actually.
            </p>
          </figcaption>
        </figure>

        <figure class="hiw_card" data-hiw-slide>
          <div class="hiw_card-thumb">
            <picture>
              <source
                media="(min-width: 1440px)"
                srcset="
                  img/how-it-works/how3.png    1x,
                  img/how-it-works/how3@2x.png 2x
                "
              />
              <source
                srcset="
                  img/how-it-works/how3-mob.png    1x,
                  img/how-it-works/how3-mob@2x.png 2x
                "
              />
              <img
                class="hiw_card-img"
                src="img/how-it-works/how3-mob.png"
                alt="Read the Trace gameplay step"
                loading="lazy"
              />
            </picture>
          </div>
          <figcaption class="hiw_card-content">
            <h3 class="hiw_card-title">Read the Trace</h3>
            <p class="hiw_card-text">
              Every path your grain travels leaves a mark. Complete enough
              levels and the traces assemble into something larger.
            </p>
          </figcaption>
        </figure>
      </div>
    </div>

    <div class="hiw_controls" aria-label="Slider navigation">
      <button
        type="button"
        class="hiw_ctrl-btn"
        data-hiw-prev
        aria-label="Previous slide"
      >
        <svg class="hiw_ctrl-icon">
          <use href="/sprite.svg#arow-back"></use>
        </svg>
      </button>

      <div class="hiw_dots" aria-label="Slides">
        <button
          type="button"
          class="hiw_dot active"
          data-hiw-dot
          data-slide="0"
          aria-label="Go to slide 1"
        ></button>
        <button
          type="button"
          class="hiw_dot"
          data-hiw-dot
          data-slide="1"
          aria-label="Go to slide 2"
        ></button>
        <button
          type="button"
          class="hiw_dot"
          data-hiw-dot
          data-slide="2"
          aria-label="Go to slide 3"
        ></button>
      </div>

      <button
        type="button"
        class="hiw_ctrl-btn"
        data-hiw-next
        aria-label="Next slide"
      >
        <svg class="hiw_ctrl-icon">
          <use href="/sprite.svg#arow-forward"></use>
        </svg>
      </button>
    </div>
  </div>
</article>
