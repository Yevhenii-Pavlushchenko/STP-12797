<article id="features" class="feat_section">
  <div class="container feat_wrapper">
    <h2 class="feat_section-title">Features</h2>

    <div class="feat_slider-viewport">
      <div class="feat_slider-track" data-hiw-track>
        <figure class="feat_card" data-hiw-slide>
          <div class="feat_card-icon-wrap">
            <svg class="feat_card-icon">
              <use href="/sprite.svg#icon-feature1"></use>
            </svg>
          </div>
          <figcaption class="feat_card-content">
            <h3 class="feat_card-title">The Ground Actually Feels Different</h3>
            <p class="feat_card-text">
              Each surface — dry clay, packed silt, soft chalk — changes how the
              grain moves and settles. Learning to listen to the terrain is the
              whole game.
            </p>
          </figcaption>
        </figure>

        <figure class="feat_card" data-hiw-slide>
          <div class="feat_card-icon-wrap">
            <svg class="feat_card-icon">
              <use href="/sprite.svg#icon-feature2"></use>
            </svg>
          </div>
          <figcaption class="feat_card-content">
            <h3 class="feat_card-title">No Timers. No Penalties.</h3>
            <p class="feat_card-text">
              Quiet Grain never rushes you. You can set it down mid-puzzle and
              it waits, exactly as you left it — the grain still resting in its
              last position.
            </p>
          </figcaption>
        </figure>

        <figure class="feat_card" data-hiw-slide>
          <div class="feat_card-icon-wrap">
            <svg class="feat_card-icon">
              <use href="/sprite.svg#icon-feature3"></use>
            </svg>
          </div>
          <figcaption class="feat_card-content">
            <h3 class="feat_card-title">A Living Atlas</h3>
            <p class="feat_card-text">
              There are over 80 levels, and they get weirder and more beautiful
              the deeper you go. Some feel geological. Others feel almost
              architectural.
            </p>
          </figcaption>
        </figure>

        <figure class="feat_card" data-hiw-slide>
          <div class="feat_card-icon-wrap">
            <svg class="feat_card-icon">
              <use href="/sprite.svg#icon-feature4"></use>
            </svg>
          </div>
          <figcaption class="feat_card-content">
            <h3 class="feat_card-title">The Trace Archive</h3>
            <p class="feat_card-text">
              Each puzzle you solve adds a piece to an image that is unique to
              you. No two archives are alike. Complete the atlas to see what
              your grain has drawn.
            </p>
          </figcaption>
        </figure>
      </div>
    </div>

    <div class="feat_controls" aria-label="Slider navigation">
      <button
        type="button"
        class="feat_ctrl-btn"
        data-hiw-prev
        aria-label="Previous slide"
      >
        <svg class="feat_ctrl-icon">
          <use href="/sprite.svg#arow-back"></use>
        </svg>
      </button>

      <div class="feat_dots" aria-label="Slides">
        <button
          type="button"
          class="feat_dot active"
          data-hiw-dot
          data-slide="0"
          aria-label="Go to slide 1"
        ></button>
        <button
          type="button"
          class="feat_dot"
          data-hiw-dot
          data-slide="1"
          aria-label="Go to slide 2"
        ></button>
        <button
          type="button"
          class="feat_dot"
          data-hiw-dot
          data-slide="2"
          aria-label="Go to slide 3"
        ></button>
        <button
          type="button"
          class="feat_dot"
          data-hiw-dot
          data-slide="3"
          aria-label="Go to slide 4"
        ></button>
      </div>

      <button
        type="button"
        class="feat_ctrl-btn"
        data-hiw-next
        aria-label="Next slide"
      >
        <svg class="feat_ctrl-icon">
          <use href="/sprite.svg#arow-forward"></use>
        </svg>
      </button>
    </div>
  </div>
</article>
